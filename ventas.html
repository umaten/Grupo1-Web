<div class="sales-wrapper">
    <div class="sales-search-group">
        <input type="text" class="sales-input-main" placeholder="Código o Nombre del producto..." aria-label="Producto">
        <input type="number" class="sales-input-qty" value="1" aria-label="Cantidad">
        <button class="sales-btn-add">AGREGAR</button>
    </div>

    <table class="sales-table">
        <caption class="sales-table-title">Caja - Nueva Venta (BodeSmart)</caption>
        <thead class="sales-thead">
        <tr>
            <th>Código</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio Unit.</th>
            <th>Subtotal</th>
            <th class="sales-txt-center">ELIMINAR</th>
        </tr>
        </thead>
        <tbody class="sales-tbody">
        <tr>
            <td>ABR-001</td>
            <td>Arroz Costeño (1 Kg)</td>
            <td>1</td>
            <td>S/ 3.50</td>
            <td>S/ 3.50</td>
            <td class="sales-txt-center">
                <button class="sales-btn-remove" title="Eliminar fila">X</button>
            </td>
        </tr>
        </tbody>
        <tfoot class="sales-tfoot">
        <tr class="sales-row-total">
            <th colspan="4" class="sales-txt-right">TOTAL A PAGAR:</th>
            <th colspan="2" class="sales-total-price">S/ 11.50</th>
        </tr>
        <tr class="sales-footer-actions">
            <td colspan="6">
                <div class="sales-action-container">
                    <button class="sales-btn-submit">✅ CONFIRMAR VENTA</button>
                    <button class="sales-btn-abort">🗑️ CANCELAR</button>
                </div>
            </td>
        </tr>
        </tfoot>
    </table>
</div>
