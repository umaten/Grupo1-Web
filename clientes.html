<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - BodeSmart</title>
    <link rel="stylesheet" href="estilo-clientes.css">
</head>
<body>
    <div class="container-clientes">
    
        <div class="busqueda-container">
            <input type="text" placeholder="Código o Nombre del CLIENTE..." class="barra-busqueda">
            <button class="btn-buscar">BUSCAR</button>
        </div>

        <table class="tabla-clientes">
            <caption>Clientes Registrados (BodeSmart)</caption>
            
            <thead class="clientes-head">
                <tr>
                    <th>Código</th>
                    <th>Nombre del Cliente</th>
                    <th class="col-acciones">EDITAR</th>
                </tr>
            </thead>
            
            <tbody>
                <tr>
                    <td>ABR-001</td>
                    <td>Carlos Espa</td>
                    <td class="col-acciones">
    <button class="btn-accion-editar" title="Editar Cliente">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/>
        </svg>
    </button>
</td>
                </tr>
                <tr>
                    <td>LAC-045</td>
                    <td>Wolfgang Grozo</td>
                    <td class="col-acciones">
    <button class="btn-accion-editar" title="Editar Cliente">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/>
        </svg>
    </button>
</td>
                </tr>
            </tbody>
            
            <tfoot class="clientes-foot">
                <tr>
                    <td colspan="3"> 
                        <div class="botones-pie">
                            <button class="btn-agregar">AGREGAR CLIENTE</button>
                            <button class="btn-eliminar">ELIMINAR CLIENTE</button>
                        </div>
                    </td>
                </tr>
            </tfoot>
        </table>
        
    </div>
</body>
</html>
